name: Generate Snake Animation

on:
  schedule:
    # Run every day at midnight UTC
    - cron: "0 0 * * *"
  # Run every Sunday
    - cron: "0 0 * * 0"
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  generate-snake:
    name: Generate GitHub Contribution Snake
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Generate snake animation
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Create or ensure output branch exists
      - name: Setup Git Config
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      # Ensure output branch exists
      - name: Create Output Branch if Missing
        run: |
          if ! git show-ref --quiet refs/heads/output; then
            git checkout --orphan output
            git rm -rf .
            git commit --allow-empty -m "Initial commit for snake animation"
            git push origin output
          else
            git checkout output
            git pull origin output
          fi

      # Copy generated files to output branch
      - name: Copy Snake Animation Files
        run: |
          mkdir -p output-files
          if [ -f dist/github-contribution-grid-snake.svg ]; then
            cp dist/github-contribution-grid-snake.svg output-files/
          fi
          if [ -f dist/github-contribution-grid-snake-dark.svg ]; then
            cp dist/github-contribution-grid-snake-dark.svg output-files/
          fi

      # Commit and push to output branch
      - name: Commit and Push to Output Branch
        run: |
          git checkout output
          mkdir -p .
          if [ -f output-files/github-contribution-grid-snake.svg ]; then
            cp output-files/github-contribution-grid-snake.svg .
          fi
          if [ -f output-files/github-contribution-grid-snake-dark.svg ]; then
            cp output-files/github-contribution-grid-snake-dark.svg .
          fi
          
          # Create a timestamp file
          echo "Generated at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > .last-updated
          
          git add github-contribution-grid-snake*.svg .last-updated 2>/dev/null || true
          git commit -m "🐍 Generate snake animation $(date -u +'%Y-%m-%d %H:%M:%S')" --allow-empty || true
          git push origin output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload artifacts for inspection
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snake-animation-output
          path: dist/
          retention-days: 30

      # Job summary
      - name: Generate Job Summary
        if: success()
        run: |
          echo "## 🐍 Snake Animation Generated Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Snake animation files have been generated and committed to the \`output\` branch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Generated Files:" >> $GITHUB_STEP_SUMMARY
          echo "- \`github-contribution-grid-snake.svg\` (Light theme)" >> $GITHUB_STEP_SUMMARY
          echo "- \`github-contribution-grid-snake-dark.svg\` (Dark theme)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎬 Animation will be displayed in your README on: [https://github.com/mohit282-cpu](https://github.com/mohit282-cpu)" >> $GITHUB_STEP_SUMMARY
